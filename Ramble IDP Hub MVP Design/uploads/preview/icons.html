<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .item {
    aspect-ratio: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px;
    background: var(--ramboll-white);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    color: var(--ocean);
  }
  .item svg { width: 22px; height: 22px; stroke-width: 1.5; }
  .nm { font-size: 9px; color: var(--fg-muted); font-weight: 700; letter-spacing: 0.02em; }
  .note { margin-top: 12px; font-size: 11px; color: var(--fg-muted); font-weight: 600; }
</style>
</head>
