<!doctype html>
<!-- @dsCard group="Spacing" name="Corner radius" subtitle="none · sm · md · lg · pill" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .swatch { width: 100%; height: 70px; background: var(--cyan-100); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--ocean); font-weight: 700; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .r-none { border-radius: 0; }
  .r-sm { border-radius: 4px; }
  .r-md { border-radius: 8px; }
  .r-lg { border-radius: 12px; }
  .r-pill { border-radius: 9999px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="swatch r-none"></div><div class="lbl">none</div><div class="val">0px</div></div>
    <div class="item"><div class="swatch r-sm"></div><div class="lbl">sm</div><div class="val">4px</div></div>
    <div class="item"><div class="swatch r-md"></div><div class="lbl">md</div><div class="val">8px</div></div>
    <div class="item"><div class="swatch r-lg"></div><div class="lbl">lg</div><div class="val">12px</div></div>
    <div class="item"><div class="swatch r-pill"></div><div class="lbl">pill</div><div class="val">9999px</div></div>
  </div>
</body>
</html>
