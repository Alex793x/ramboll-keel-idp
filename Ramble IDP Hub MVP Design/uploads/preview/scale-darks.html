<!doctype html>
<!-- @dsCard group="Colors" name="Forest / Heath / Mountain scales" subtitle="Dark-base tint scales" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  .group { display: grid; gap: 4px; margin-bottom: 8px; }
  .name { font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ocean); }
  .scale { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
  .step {
    height: 38px;
    padding: 4px 6px;
    display: flex;
    align-items: center;
    color: var(--ramboll-white);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
  }
  .step.light { color: var(--ocean); }
</style>
</head>
<body>
  <div class="group">
    <div class="name">Forest</div>
    <div class="scale">
      <div class="step" style="background:#125a40">100</div>
      <div class="step" style="background:#417b66">80</div>
      <div class="step" style="background:#719c8c">60</div>
      <div class="step light" style="background:#a0bdb3">40</div>
      <div class="step light" style="background:#d0ded9">20</div>
      <div class="step light" style="background:#e7eeec">10</div>
    </div>
  </div>
  <div class="group">
    <div class="name">Heath</div>
    <div class="scale">
      <div class="step" style="background:#62294b">100</div>
      <div class="step" style="background:#81546f">80</div>
      <div class="step" style="background:#a17f93">60</div>
      <div class="step light" style="background:#c0a9b7">40</div>
      <div class="step light" style="background:#e0d4db">20</div>
      <div class="step light" style="background:#efe9ed">10</div>
    </div>
  </div>
  <div class="group">
    <div class="name">Mountain</div>
    <div class="scale">
      <div class="step" style="background:#273943">100</div>
      <div class="step" style="background:#526169">80</div>
      <div class="step" style="background:#7d888e">60</div>
      <div class="step light" style="background:#a9b0b4">40</div>
      <div class="step light" style="background:#d4d7d9">20</div>
      <div class="step light" style="background:#e9ebec">10</div>
    </div>
  </div>
</body>
</html>
