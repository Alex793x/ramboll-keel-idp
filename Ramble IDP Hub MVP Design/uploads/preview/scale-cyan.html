<!doctype html>
<!-- @dsCard group="Colors" name="Cyan scale" subtitle="Cyan tints 100→10%" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  .scale { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
  .step {
    height: 100px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    color: var(--ramboll-white);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
  }
  .step.light { color: var(--ocean); }
  .pct { font-size: 14px; font-weight: 800; font-family: var(--font-sans); letter-spacing: -0.01em; }
</style>
</head>
<body>
  <div class="scale">
    <div class="step"        style="background:#0098eb"><div class="pct">100</div>#0098EB</div>
    <div class="step"        style="background:#33adef"><div class="pct">80</div>#33ADEF</div>
    <div class="step"        style="background:#66c1f3"><div class="pct">60</div>#66C1F3</div>
    <div class="step light"  style="background:#99d6f7"><div class="pct">40</div>#99D6F7</div>
    <div class="step light"  style="background:#cceafb"><div class="pct">20</div>#CCEAFB</div>
    <div class="step light"  style="background:#e5f4fd"><div class="pct">10</div>#E5F4FD</div>
  </div>
</body>
</html>
