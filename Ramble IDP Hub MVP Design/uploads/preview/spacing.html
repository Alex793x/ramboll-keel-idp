<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4px grid — space-1 through space-24" viewport="700x320" -->
<html lang="en">
<head>

<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 24px; }

  .bar { background: var(--cyan-100); height: 24px; border-radius: 4px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--ocean); font-weight: 700; width: 56px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); font-weight: 500; }
</style>
</head>
<body>
  <div class="row"><div class="lbl">space-1</div><div class="bar" style="width:4px"></div><div class="val">4px</div></div>
  <div class="row"><div class="lbl">space-2</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
  <div class="row"><div class="lbl">space-3</div><div class="bar" style="width:12px"></div><div class="val">12px</div></div>
  <div class="row"><div class="lbl">space-4</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
  <div class="row"><div class="lbl">space-6</div><div class="bar" style="width:24px"></div><div class="val">24px</div></div>
  <div class="row"><div class="lbl">space-8</div><div class="bar" style="width:32px"></div><div class="val">32px</div></div>
  <div class="row"><div class="lbl">space-12</div><div class="bar" style="width:48px"></div><div class="val">48px</div></div>
  <div class="row"><div class="lbl">space-16</div><div class="bar" style="width:64px"></div><div class="val">64px</div></div>
  <div class="row"><div class="lbl">space-24</div><div class="bar" style="width:96px"></div><div class="val">96px</div></div>
</body>
</html>
