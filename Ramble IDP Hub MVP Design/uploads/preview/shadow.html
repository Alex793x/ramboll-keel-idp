<!doctype html>
<!-- @dsCard group="Spacing" name="Shadow / elevation" subtitle="Ocean-tinted shadows, xs through xl" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 28px 24px; background: var(--pebble-20); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .swatch {
    width: 100%; height: 56px;
    background: var(--ramboll-white);
    border-radius: 10px;
  }
  .s-xs { box-shadow: 0 1px 2px rgba(5, 50, 110, 0.04); }
  .s-sm { box-shadow: 0 1px 2px rgba(5, 50, 110, 0.06), 0 1px 1px rgba(5, 50, 110, 0.04); }
  .s-md { box-shadow: 0 4px 12px rgba(5, 50, 110, 0.08), 0 1px 2px rgba(5, 50, 110, 0.05); }
  .s-lg { box-shadow: 0 16px 40px rgba(5, 50, 110, 0.10), 0 4px 8px rgba(5, 50, 110, 0.05); }
  .s-xl { box-shadow: 0 32px 80px rgba(5, 50, 110, 0.14); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--ocean); font-weight: 700; }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="swatch s-xs"></div><div class="lbl">xs</div></div>
    <div class="item"><div class="swatch s-sm"></div><div class="lbl">sm</div></div>
    <div class="item"><div class="swatch s-md"></div><div class="lbl">md</div></div>
    <div class="item"><div class="swatch s-lg"></div><div class="lbl">lg</div></div>
    <div class="item"><div class="swatch s-xl"></div><div class="lbl">xl</div></div>
  </div>
</body>
</html>
