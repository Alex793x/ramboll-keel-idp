<!doctype html>
<!-- @dsCard group="Colors" name="Grass / Pebble scales" subtitle="Light-base tint scales" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  .group { display: grid; gap: 4px; margin-bottom: 8px; }
  .name { font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ocean); }
  .scale { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
  .step {
    height: 38px;
    padding: 4px 6px;
    display: flex;
    align-items: center;
    color: var(--ocean);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="group">
    <div class="name">Grass</div>
    <div class="scale">
      <div class="step" style="background:#add095">100</div>
      <div class="step" style="background:#bdd9aa">80</div>
      <div class="step" style="background:#cee3bf">60</div>
      <div class="step" style="background:#deecd5">40</div>
      <div class="step" style="background:#eff6ea">20</div>
      <div class="step" style="background:#f6faf4">10</div>
    </div>
  </div>
  <div class="group">
    <div class="name">Pebble</div>
    <div class="scale">
      <div class="step" style="background:#e3e1d8">100</div>
      <div class="step" style="background:#e9e7e0">80</div>
      <div class="step" style="background:#eeede8">60</div>
      <div class="step" style="background:#f4f3ef">40</div>
      <div class="step" style="background:#f9f9f7">20</div>
      <div class="step" style="background:#fcfcfb">10</div>
    </div>
  </div>
</body>
</html>
