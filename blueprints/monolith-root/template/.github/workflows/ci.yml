# Smart monolith CI — change-aware selective rebuilds.
#
#   detect   → resolves the git diff to affected services via
#              .github/scripts/detect_services.py + keel.services.json.
#   gate     → ALWAYS runs: resolver property tests + manifest sanity.
#              This is the required check on `main`.
#   services → matrix over ONLY the affected services, per-language steps.
#
# Any failure to compute the diff degrades safely to a FULL rebuild
# (the resolver is a total function — see docs/ci.md).
name: ci

on:
  push:
    branches: [main, dev, staging]
  pull_request:

permissions:
  contents: read

jobs:
  detect:
    name: detect
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.resolve.outputs.services }}
      any: ${{ steps.resolve.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed paths
        shell: bash
        run: |
          set -u
          RANGE=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" || true
            RANGE="origin/${{ github.base_ref }}...HEAD"
          else
            BEFORE="${{ github.event.before }}"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              RANGE="${BEFORE}..HEAD"
            fi
          fi
          : > changed.txt
          if [ -n "$RANGE" ]; then
            git diff --name-only "$RANGE" > changed.txt || : > changed.txt
          fi
          echo "diff range: ${RANGE:-<none - resolver falls back to ALL services>}"
          cat changed.txt

      - name: Resolve affected services
        id: resolve
        run: |
          python .github/scripts/detect_services.py \
            --manifest keel.services.json \
            --changed changed.txt \
            --github-output "$GITHUB_OUTPUT"

  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the gate toolchain
        run: pip install -e ".[dev]"

      - name: Resolver property tests + root tests
        run: pytest -q

      - name: Manifest sanity
        run: |
          python -c "import json,pathlib; m=json.load(open('keel.services.json')); dirs=[s['dir'] for s in m['services']]; assert len(dirs)==len(set(dirs)), f'duplicate service dirs: {dirs}'; missing=[d for d in dirs if not pathlib.Path('services',d).is_dir()]; assert not missing, f'manifest dirs missing on disk: {missing}'; print('manifest OK:', ', '.join(dirs))"

  services:
    name: "${{ matrix.name }} (services/${{ matrix.dir }})"
    needs: [detect, gate]
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      # ---------- python ----------
      - name: Set up Python
        if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python — install
        if: matrix.lang == 'python'
        working-directory: services/${{ matrix.dir }}
        run: pip install -e ".[dev]"
      - name: Python — test, lint, format, types
        if: matrix.lang == 'python'
        working-directory: services/${{ matrix.dir }}
        run: |
          pytest -q
          ruff check .
          black --check .
          mypy

      # ---------- node / react ----------
      - name: Set up Node
        if: matrix.lang == 'node' || matrix.lang == 'react'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Node — install, test, build
        if: matrix.lang == 'node' || matrix.lang == 'react'
        working-directory: services/${{ matrix.dir }}
        run: |
          npm ci
          npm test
          npm run build --if-present

      # ---------- go ----------
      - name: Set up Go
        if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Go — vet, test, build
        if: matrix.lang == 'go'
        working-directory: services/${{ matrix.dir }}
        run: |
          go vet ./...
          go test ./...
          go build ./...

      # ---------- dotnet ----------
      - name: Set up .NET
        if: matrix.lang == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: dotnet — test
        if: matrix.lang == 'dotnet'
        working-directory: services/${{ matrix.dir }}
        run: dotnet test

      # ---------- terraform ----------
      - name: Set up Terraform
        if: matrix.lang == 'terraform'
        uses: hashicorp/setup-terraform@v3
      - name: Terraform — fmt, init, validate
        if: matrix.lang == 'terraform'
        working-directory: services/${{ matrix.dir }}
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate
