apiVersion: keel/v1
kind: Blueprint

metadata:
  name: python-service
  title: Python Service
  description: REST or worker service — the Ramboll Python golden path.
  version: "1.0.0"
  owner: platform-engineering
  tags: [python, service, golden-path]

parameters:
  - id: project_name
    title: Project name
    type: string
    required: true
    pattern: "^[a-z][a-z0-9-]{2,40}$"
    help: >-
      Lowercase repository / package name. Start with a letter; use letters,
      digits and hyphens only (3–41 chars). Example: invoicing-api.
  - id: owning_team
    title: Owning team
    type: string
    required: true
    help: >-
      The GitHub team that owns this service (used for CODEOWNERS), e.g.
      platform-engineering.
  - id: service_kind
    title: Service kind
    type: enum
    required: true
    values: [rest-api, worker]
    default: rest-api
    help: >-
      rest-api seeds a FastAPI health endpoint; worker seeds a background
      worker entrypoint with no HTTP surface.
  - id: description
    title: Description
    type: string
    required: true
    help: One sentence describing what this service does.
  - id: author
    title: Author
    type: string
    required: true
    help: Name (or name <email>) recorded as the package author.

template:
  root: template
  rename: ".j2"
  conditions:
    - when: "service_kind == 'rest-api'"
      paths:
        - "src/{{ package_name }}/api.py"

repository:
  visibility: internal
  default_branch: main
  branches: [main, dev, staging]
  protect:
    - branch: main
      require_pull_request: true
      required_reviews: 1
      require_codeowners: true
      required_checks: [build, test, validate]

postActions:
  - create_repository
  - commit_template
  - setup_branches
  - apply_protection
  - enable_ci
  - publish_docs
  - register_in_catalog
