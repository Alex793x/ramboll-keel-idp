# build — dispatched to the shared, language-aware pipeline. EVERY Keel repo points at the SAME
# reusable workflow; the 'stack' input selects the right build composite (SPEC §14). Do NOT
# inline pipeline logic here. The check name 'build' is part of the branch-protection contract.
name: build

on:
  push:
    branches: [main, dev, staging]
  pull_request:

jobs:
  build:
    uses: Alex793x/keel/.github/workflows/reusable-build.yml@main
    with:
      stack: react
