apiVersion: keel/v2
kind: Blueprint

metadata:
  name: dp-python
  title: Data Pipeline — Python
  description: Data pipeline service (pure record transforms) — the Ramboll Python golden path.
  version: "0.1.0"
  owner: platform-engineering
  tags: [python, data, pipeline, service, golden-path]

# v3 service-catalog metadata: this blueprint is resolved for the `dp:python`
# combo (dir contract: blueprints/services/{tag}-{lang}). Additive — the
# keel/v2 manifest loader ignores unknown keys.
service:
  type: dp
  language: python

# Form parameters only. Ownership (department + selected users) is NOT collected
# here — it comes from the Hub's department/users selection step and is injected
# into the render context as `department` and `users` (see SPEC §3.2).
parameters:
  - id: project_name
    title: Project name
    type: string
    required: true
    pattern: "^[a-z][a-z0-9-]{2,40}$"
    help: >-
      Lowercase repository / package name. Start with a letter; use letters,
      digits and hyphens only (3–41 chars). Example: sensor-ingest.
  - id: description
    title: Description
    type: string
    required: true
    help: One sentence describing what this pipeline does.
  - id: author
    title: Author
    type: string
    required: true
    help: Name (or name <email>) recorded as the package author.

template:
  root: template
  rename: ".j2"

repository:
  visibility: internal
  default_branch: main
  branches: [main, dev, staging]
  protect:
    - branch: main
      require_pull_request: true
      required_reviews: 1
      require_codeowners: true
      required_checks: [build, test, validate]

postActions:
  - create_repository
  - commit_template
  - setup_branches
  - apply_protection
  - enable_ci
  - publish_docs
  - register_in_catalog
