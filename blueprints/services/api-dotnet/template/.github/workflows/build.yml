# Build — self-contained .NET CI. The platform's reusable workflows are
# Python-focused; .NET services use self-contained lang CI (SPEC §14).
# The check name `build` is part of the branch-protection contract.
name: build

on:
  push:
    branches: [main, dev, staging]
  pull_request:

jobs:
  build:
    name: dotnet build (Release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build API
        run: dotnet build src/Api/Api.csproj -c Release
