# validate — dispatched to the shared, language-aware pipeline. EVERY Keel repo points at the SAME
# reusable workflow; the 'stack' input selects the right validate composite (SPEC §14). Do NOT
# inline pipeline logic here. The check name 'validate' is part of the branch-protection contract.
name: validate

on:
  push:
    branches: [main, dev, staging]
  pull_request:

jobs:
  validate:
    uses: Alex793x/keel/.github/workflows/reusable-validate.yml@main
    with:
      stack: node
