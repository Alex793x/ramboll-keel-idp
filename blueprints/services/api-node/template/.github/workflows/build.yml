# Build — self-contained Node CI. The platform's reusable workflows are
# Python-focused; Node services use self-contained lang CI (SPEC §14).
# The check name `build` is part of the branch-protection contract.
name: build

on:
  push:
    branches: [main, dev, staging]
  pull_request:

jobs:
  build:
    name: TypeScript build (dist/)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # The first commit ships no package-lock.json (versions are pinned exactly
      # in package.json). Commit the lockfile, then switch this to `npm ci`.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
