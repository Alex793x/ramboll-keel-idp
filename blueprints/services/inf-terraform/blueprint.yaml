apiVersion: keel/v2
kind: Blueprint

metadata:
  name: inf-terraform
  title: Infrastructure — Terraform
  description: Terraform (azurerm) infrastructure skeleton with platform naming and tagging.
  version: "0.1.0"
  owner: platform-engineering
  tags: [terraform, azure, infrastructure, service, golden-path]

# v3 service-catalog metadata: this blueprint is resolved for the
# `inf:terraform` combo (dir contract: blueprints/services/{tag}-{lang}).
# Additive — the keel/v2 manifest loader ignores unknown keys.
service:
  type: inf
  language: terraform

# Form parameters only. Ownership (department + selected users) is NOT collected
# here — it comes from the Hub's department/users selection step and is injected
# into the render context as `department` and `users` (see SPEC §3.2).
parameters:
  - id: project_name
    title: Project name
    type: string
    required: true
    pattern: "^[a-z][a-z0-9-]{2,40}$"
    help: >-
      Lowercase repository / stack name. Start with a letter; use letters,
      digits and hyphens only (3–41 chars). Example: invoicing-infra.
  - id: description
    title: Description
    type: string
    required: true
    help: One sentence describing what this stack provisions.
  - id: author
    title: Author
    type: string
    required: true
    help: Name (or name <email>) recorded as the stack author.

template:
  root: template
  rename: ".j2"

repository:
  visibility: internal
  default_branch: main
  branches: [main, dev, staging]
  protect:
    - branch: main
      require_pull_request: true
      required_reviews: 1
      require_codeowners: true
      required_checks: [build, test, validate]

postActions:
  - create_repository
  - commit_template
  - setup_branches
  - apply_protection
  - enable_ci
  - publish_docs
  - register_in_catalog
