# Test — self-contained Go CI. Runs the table tests and the fuzz seed corpus
# (fuzz targets execute their seeds on a plain `go test`). The check name
# `test` is part of the branch-protection contract.
name: test

on:
  push:
    branches: [main, dev, staging]
  pull_request:

jobs:
  test:
    name: go test (table + fuzz seeds)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        run: go test ./...
