# Validate — self-contained Go CI: formatting (gofmt) and static analysis
# (go vet). The check name `validate` is part of the branch-protection
# contract.
name: validate

on:
  push:
    branches: [main, dev, staging]
  pull_request:

jobs:
  validate:
    name: gofmt + go vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Format check (gofmt)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needs to run on:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...
