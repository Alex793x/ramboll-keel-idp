name: "Setup Python environment"
description: >-
  Shared, generic building block for the Ramboll Developer Platform (Keel) CI.
  Sets up Python with pip caching, upgrades pip, installs the local package if a
  pyproject.toml / setup.py is present, and installs the standard dev toolchain
  (ruff, black, mypy, pytest, hypothesis). Reused by reusable-build / -test /
  -validate so a single edit here updates every blueprint's pipeline.

inputs:
  python-version:
    description: "Python version to set up."
    required: false
    default: "3.12"

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: "pip"

    - name: Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip

    - name: Install project (generic, if packaging metadata exists)
      shell: bash
      run: |
        if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
          echo "Packaging metadata found — installing the local package."
          # Install the package with its dev extras when available; fall back to a
          # plain install. Never hard-code a package name so this works for any
          # generated repo.
          python -m pip install ".[dev]" || python -m pip install .
        else
          echo "No packaging metadata found — skipping local package install."
        fi

    - name: Install standard dev toolchain
      shell: bash
      run: python -m pip install ruff black mypy pytest hypothesis
