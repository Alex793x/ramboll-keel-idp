name: "validate · node"
description: "Strict TypeScript typecheck (tsconfig strict + noUnusedLocals/Parameters)."
inputs:
  working-directory:
    description: "Service directory (repo root for single-service repos, services/<dir> in a monolith)."
    required: false
    default: "."
runs:
  using: composite
  steps:
    - name: Set up Node 22
      uses: actions/setup-node@v4
      with:
        node-version: "22"
    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm install --no-audit --no-fund
    - name: Typecheck
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm run typecheck
