name: "validate · dotnet"
description: "Warning-clean Release build of both projects (analyzers + nullable as errors)."
inputs:
  working-directory:
    description: "Service directory (repo root for single-service repos, services/<dir> in a monolith)."
    required: false
    default: "."
runs:
  using: composite
  steps:
    - name: Set up .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "8.0.x"
    - name: Validate API
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: dotnet build src/Api/Api.csproj -c Release -warnaserror
    - name: Validate tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: dotnet build tests/Api.Tests/Api.Tests.csproj -c Release -warnaserror
