name: "test · dotnet"
description: "Run the xUnit suite (restores and builds the referenced API project too)."
inputs:
  working-directory:
    description: "Service directory (repo root for single-service repos, services/<dir> in a monolith)."
    required: false
    default: "."
runs:
  using: composite
  steps:
    - name: Set up .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "8.0.x"
    - name: Test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: dotnet test tests/Api.Tests/Api.Tests.csproj -c Release
