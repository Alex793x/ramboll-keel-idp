name: "test · python"
description: "Run pytest (smoke + Hypothesis property tests) — the green-from-birth bar."
inputs:
  working-directory:
    description: "Service directory (repo root for single-service repos, services/<dir> in a monolith)."
    required: false
    default: "."
  python-version:
    description: "Python version to test against."
    required: false
    default: "3.12"
runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
    - name: Install package + test toolchain
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        python -m pip install --upgrade pip
        if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
          python -m pip install ".[dev]" || python -m pip install .
        fi
        python -m pip install pytest hypothesis
    - name: Run tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pytest -q
