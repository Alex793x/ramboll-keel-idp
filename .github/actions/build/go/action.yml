name: "build · go"
description: "Compile all Go packages."
inputs:
  working-directory:
    description: "Service directory (repo root for single-service repos, services/<dir> in a monolith)."
    required: false
    default: "."
runs:
  using: composite
  steps:
    - name: Set up Go 1.22
      uses: actions/setup-go@v5
      with:
        go-version: "1.22"
    - name: Build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: go build ./...
