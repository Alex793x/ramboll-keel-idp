name: ci

# Keel's OWN continuous integration (this repo — the v2 platform: a Rust Cargo
# workspace engine + a TanStack Start hub). NOT a generated repo. Three jobs:
#
#   1. rust   — fmt + clippy (deny warnings) + the workspace test suite
#               (unit + proptest) for the keel-* crates.
#   2. hub    — the TanStack Start experience plane: install, Vitest, build.
#   3. blueprint-is-software (whitepaper §5.4) — build the CLI, render the Python
#               golden-path blueprint (services/api-python, the default for a bare
#               init) to a throwaway dir with the *local* provider, then prove the
#               generated repo is green from birth (pytest / ruff / black / mypy).
#
# The reusable workflows in this directory (reusable-{build,test,validate}.yml)
# are a *separate* product: they serve the generated Python repos and are NOT
# invoked here. See .github/README.md.

on:
  push:
    branches: [main, dev, staging]
  pull_request: {}

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Rust engine: format, lint (deny warnings), test the whole workspace.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust engine (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check (cargo fmt)
        run: cargo fmt --all --check

      - name: Lint (cargo clippy, warnings denied)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (cargo test, whole workspace)
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # 2. Hub (TanStack Start): install, Vitest, production build.
  # ---------------------------------------------------------------------------
  hub:
    name: Hub (TanStack Start — test + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: hub/package-lock.json

      - name: Install dependencies (npm ci)
        working-directory: hub
        run: npm ci

      - name: Unit + property tests (Vitest)
        working-directory: hub
        run: npm test

      - name: Production build
        working-directory: hub
        run: npm run build

  # ---------------------------------------------------------------------------
  # 3. Blueprint is software (whitepaper §5.4): render the Python golden-path
  #    blueprint locally via the CLI, then prove the generated repo is green.
  # ---------------------------------------------------------------------------
  blueprint-is-software:
    name: Blueprint is software (render + green from birth)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build the CLI (keel-cli)
        run: cargo build -p keel-cli

      - name: Render the Python golden-path blueprint (local provider)
        shell: bash
        run: |
          # A bare init (no --services) defaults to a single api:python service (the Python
          # golden path, blueprints/services/api-python) rendered via the LOCAL provider (no
          # GitHub, no `gh`): the full tree is written to disk so CI can assert it is green from
          # its first commit. The single repo is named "<project>-api", so the output lands at
          # "$RUNNER_TEMP/out/ci-check-api".
          cargo run -p keel-cli -- init \
            --project ci-check \
            --department energy \
            --users u-alex \
            --service-kind rest-api \
            --description "CI render check" \
            --author ci \
            --local "$RUNNER_TEMP/out"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install & gate the generated repo (green from birth)
        shell: bash
        working-directory: ${{ runner.temp }}/out/ci-check-api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
          pytest
          ruff check .
          black --check .
          mypy .
