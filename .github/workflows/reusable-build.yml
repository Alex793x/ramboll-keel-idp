name: reusable-build

# Central, reusable BUILD workflow for the Ramboll Developer Platform (Keel).
# Every generated repo's `build.yml` calls this by path (contract: SPEC §6):
#   uses: Alex793x/keel/.github/workflows/reusable-build.yml@main
# Fix the build once here and every blueprint benefits — no copy-pasted pipelines.
#
# NOTE: this workflow is SELF-CONTAINED. When a remote repo calls a reusable
# workflow, any `uses: ./...` local-action path resolves against the *caller's*
# checkout (which does not ship our composite action), so setup is inlined here.
# Filename + the `python-version` input below are the frozen part of the contract.

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to build against."
        required: false
        type: string
        default: "3.12"

jobs:
  build:
    name: Build & import check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: Upgrade pip
        shell: bash
        run: python -m pip install --upgrade pip

      - name: Install package (generic)
        shell: bash
        run: |
          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
            python -m pip install .
          else
            echo "No packaging metadata — skipping install step."
          fi

      - name: Compile all sources (import/syntax check)
        shell: bash
        run: python -m compileall -q .

      - name: Build distribution (if packaging metadata exists)
        shell: bash
        run: |
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            python -m pip install build
            python -m build
          else
            echo "No packaging metadata — skipping python -m build."
          fi
