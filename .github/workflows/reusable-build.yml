name: reusable-build

# Central, language-aware BUILD dispatcher for the Ramboll Developer Platform (Keel).
# EVERY generated repo's `build.yml` calls this by path — the reference is identical for every
# project and language (contract: SPEC §6/§14):
#   uses: Alex793x/keel/.github/workflows/reusable-build.yml@main
#   with: { stack: <python|dotnet|node|react|go|terraform> }
# The `stack` input selects the matching composite under `.github/actions/build/<stack>/`, so the
# pipeline logic lives in ONE readable place per language — fix it once, every repo benefits.
#
# Back-compat: `python-version` is still accepted (threaded into the python composite) and `stack`
# defaults to `python`, so repos generated before v5.1 keep working unchanged.

on:
  workflow_call:
    inputs:
      stack:
        description: "CI stack: python | dotnet | node | react | go | terraform."
        required: false
        type: string
        default: "python"
      working-directory:
        description: "Directory to build in (repo root for single-service repos; services/<dir> in a monolith)."
        required: false
        type: string
        default: "."
      python-version:
        description: "Python version (python stack only)."
        required: false
        type: string
        default: "3.12"

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate stack
        shell: bash
        run: |
          case "${{ inputs.stack }}" in
            python|dotnet|node|react|go|terraform) echo "stack=${{ inputs.stack }}" ;;
            *) echo "::error::unknown stack '${{ inputs.stack }}' (expected python|dotnet|node|react|go|terraform)"; exit 1 ;;
          esac

      - name: Build (python)
        if: ${{ inputs.stack == 'python' }}
        uses: Alex793x/keel/.github/actions/build/python@main
        with:
          working-directory: ${{ inputs.working-directory }}
          python-version: ${{ inputs.python-version }}

      - name: Build (dotnet)
        if: ${{ inputs.stack == 'dotnet' }}
        uses: Alex793x/keel/.github/actions/build/dotnet@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Build (node)
        if: ${{ inputs.stack == 'node' || inputs.stack == 'react' }}
        uses: Alex793x/keel/.github/actions/build/node@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Build (go)
        if: ${{ inputs.stack == 'go' }}
        uses: Alex793x/keel/.github/actions/build/go@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Build (terraform)
        if: ${{ inputs.stack == 'terraform' }}
        uses: Alex793x/keel/.github/actions/build/terraform@main
        with:
          working-directory: ${{ inputs.working-directory }}
