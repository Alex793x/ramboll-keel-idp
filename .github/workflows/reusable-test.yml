name: reusable-test

# Central, reusable TEST workflow for the Ramboll Developer Platform (Keel).
# Every generated repo's `test.yml` calls this by path (contract: SPEC §6 +
# Tracker integration contracts):
#   uses: Alex793x/keel/.github/workflows/reusable-test.yml@main
# Runs the seeded smoke + Hypothesis property tests (the "green from birth" bar).
# Filename + the `python-version` input below are the frozen part of the contract.

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to test against."
        required: false
        type: string
        default: "3.12"

jobs:
  test:
    name: Pytest (smoke + property)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ inputs.python-version }}

      - name: Run tests
        shell: bash
        run: pytest -q
