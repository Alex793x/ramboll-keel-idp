name: reusable-validate

# Central, reusable VALIDATE workflow for the Ramboll Developer Platform (Keel).
# Every generated repo's `validate.yml` calls this by path (contract: SPEC §6):
#   uses: Alex793x/keel/.github/workflows/reusable-validate.yml@main
# Enforces standards-as-code: lint, format, types, branch-name governance, docs.
#
# Self-contained: setup is inlined (a remote caller does not ship our composite
# action). Filename + the `python-version` input are the frozen contract.

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to validate against."
        required: false
        type: string
        default: "3.12"

jobs:
  validate:
    name: Lint, types, governance & docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: Install package + lint toolchain
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
            python -m pip install ".[dev]" || python -m pip install .
          fi
          python -m pip install ruff black mypy

      - name: Lint (ruff)
        shell: bash
        run: ruff check .

      - name: Format check (black)
        shell: bash
        run: black --check .

      - name: Type check (mypy)
        shell: bash
        run: mypy .

      - name: Branch-name governance (pull requests only)
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Governance gate (git-ci-governance skill): the PR head ref must be a
          # working branch (feature/ | bug/ | hotfix/) or a protected branch
          # (main | dev | staging). Same rule as .github/scripts/check_branch_name.py.
          if [[ "${HEAD_REF}" =~ ^(feature|bug|hotfix)/.+$ ]] \
             || [[ "${HEAD_REF}" == "main" ]] \
             || [[ "${HEAD_REF}" == "dev" ]] \
             || [[ "${HEAD_REF}" == "staging" ]]; then
            echo "Branch name '${HEAD_REF}' is valid."
          else
            echo "::error::Branch name '${HEAD_REF}' violates the Keel git governance policy."
            echo "Working branches must be named feature/<ticket>-<slug>, bug/<...> or hotfix/<...>."
            echo "Protected branches allowed: main, dev, staging."
            exit 1
          fi

      - name: Docs build (mkdocs --strict, if configured)
        shell: bash
        run: |
          if [ -f mkdocs.yml ]; then
            python -m pip install mkdocs mkdocs-material
            mkdocs build --strict
          else
            echo "No mkdocs.yml — skipping docs build."
          fi
