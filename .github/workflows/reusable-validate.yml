name: reusable-validate

# Central, language-aware VALIDATE dispatcher for the Ramboll Developer Platform (Keel).
# EVERY generated repo's `validate.yml` calls this by path (contract: SPEC §6/§14):
#   uses: Alex793x/keel/.github/workflows/reusable-validate.yml@main
#   with: { stack: <python|dotnet|node|react|go|terraform> }
# Branch-name governance runs for EVERY stack (shared composite); the `stack` input then selects
# the language validate composite under `.github/actions/validate/<stack>/`.
#
# Back-compat: `python-version` accepted; `stack` defaults to `python`.

on:
  workflow_call:
    inputs:
      stack:
        description: "CI stack: python | dotnet | node | react | go | terraform."
        required: false
        type: string
        default: "python"
      working-directory:
        description: "Directory to validate (repo root for single-service repos; services/<dir> in a monolith)."
        required: false
        type: string
        default: "."
      python-version:
        description: "Python version (python stack only)."
        required: false
        type: string
        default: "3.12"

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate stack
        shell: bash
        run: |
          case "${{ inputs.stack }}" in
            python|dotnet|node|react|go|terraform) echo "stack=${{ inputs.stack }}" ;;
            *) echo "::error::unknown stack '${{ inputs.stack }}' (expected python|dotnet|node|react|go|terraform)"; exit 1 ;;
          esac

      - name: Branch-name governance
        uses: Alex793x/keel/.github/actions/validate/governance@main

      - name: Validate (python)
        if: ${{ inputs.stack == 'python' }}
        uses: Alex793x/keel/.github/actions/validate/python@main
        with:
          working-directory: ${{ inputs.working-directory }}
          python-version: ${{ inputs.python-version }}

      - name: Validate (dotnet)
        if: ${{ inputs.stack == 'dotnet' }}
        uses: Alex793x/keel/.github/actions/validate/dotnet@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Validate (node)
        if: ${{ inputs.stack == 'node' || inputs.stack == 'react' }}
        uses: Alex793x/keel/.github/actions/validate/node@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Validate (go)
        if: ${{ inputs.stack == 'go' }}
        uses: Alex793x/keel/.github/actions/validate/go@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Validate (terraform)
        if: ${{ inputs.stack == 'terraform' }}
        uses: Alex793x/keel/.github/actions/validate/terraform@main
        with:
          working-directory: ${{ inputs.working-directory }}
