# Hermetic test fixture for keel-engine workflow tests.
# Mirrors the real python-service schema (keel/v1) so the real `load_manifest` accepts it,
# but is intentionally tiny.
apiVersion: keel/v1
kind: Blueprint

metadata:
  name: fixture-service
  title: Fixture Service
  description: Minimal blueprint used only by keel-engine tests.
  version: "0.0.1"
  owner: platform-engineering
  tags: [test, fixture]

parameters:
  - id: project_name
    title: Project name
    type: string
    required: true
    pattern: "^[a-z][a-z0-9-]{2,40}$"
  - id: service_kind
    title: Service kind
    type: enum
    required: true
    values: [rest-api, worker]
    default: rest-api
  - id: description
    title: Description
    type: string
    required: true
  - id: author
    title: Author
    type: string
    required: true

template:
  root: template
  rename: ".j2"

repository:
  visibility: internal
  default_branch: main
  branches: [main, dev, staging]
  protect:
    - branch: main
      require_pull_request: true
      required_reviews: 1
      require_codeowners: true
      required_checks: [build, test, validate]
