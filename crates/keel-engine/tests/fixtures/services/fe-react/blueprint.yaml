# Hermetic v3 service fixture for keel-engine tests (see api-python/blueprint.yaml).
apiVersion: keel/v2
kind: Blueprint

metadata:
  name: fe-react
  title: React Frontend (fixture)
  description: Minimal fe-react fixture used only by keel-engine v3 tests.
  version: "0.4.0"
  owner: platform-engineering
  tags: [test, fixture, fe, react]
  service:
    type: fe
    language: react

parameters:
  - id: project_name
    title: Project name
    type: string
    required: true
    pattern: "^[a-z][a-z0-9-]{2,40}$"
  - id: description
    title: Description
    type: string
    required: true
  - id: author
    title: Author
    type: string
    required: true

template:
  root: template
  rename: ".j2"

repository:
  visibility: internal
  default_branch: main
  branches: [main, dev, staging]
  protect:
    - branch: main
      require_pull_request: true
      required_reviews: 1
      require_codeowners: true
      required_checks: [build, test, validate]
