# Hermetic v3 service fixture for keel-engine tests.
# Mirrors the real keel/v2 service-blueprint schema (metadata.service is informational;
# the engine resolves blueprints by directory name), but is intentionally tiny.
apiVersion: keel/v2
kind: Blueprint

metadata:
  name: api-python
  title: Python API Service (fixture)
  description: Minimal api-python fixture used only by keel-engine v3 tests.
  version: "0.3.0"
  owner: platform-engineering
  tags: [test, fixture, api, python]
  service:
    type: api
    language: python

parameters:
  - id: project_name
    title: Project name
    type: string
    required: true
    pattern: "^[a-z][a-z0-9-]{2,40}$"
  - id: description
    title: Description
    type: string
    required: true
  - id: author
    title: Author
    type: string
    required: true

template:
  root: template
  rename: ".j2"

repository:
  visibility: internal
  default_branch: main
  branches: [main, dev, staging]
  protect:
    - branch: main
      require_pull_request: true
      required_reviews: 1
      require_codeowners: true
      required_checks: [build, test, validate]
